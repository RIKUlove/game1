<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>横スクロールゲーム（ゴール付き）</title>
<style>
  body { margin:0; overflow:hidden; background:#87CEEB; }
  canvas { display:block; margin:0 auto; background:#87CEEB; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 400;

let keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

const player = { x:100, y:300, w:30, h:30, vx:0, vy:0, onGround:false };
const gravity = 0.5;
let gameClear = false;

const platforms = [
  {x:0,y:350,w:400,h:50},
  {x:500,y:350,w:300,h:50},
  {x:900,y:350,w:400,h:50},
  {x:300,y:280,w:100,h:20},
  {x:650,y:250,w:100,h:20}
];

const spikes = [
  {x:420,y:330,w:30,h:20},
  {x:460,y:330,w:30,h:20},
  {x:800,y:330,w:30,h:20}
];

const movingPlatforms = [
  {x:1100,y:280,w:100,h:20,dir:1}
];

// ゴール
const goal = { x:1400, y:300, w:20, h:50 };

let cameraX = 0;

function reset() {
  player.x = 100;
  player.y = 300;
  player.vx = 0;
  player.vy = 0;
  gameClear = false;
}

function hit(a,b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function update(){
  if(gameClear) return;

  if(keys["ArrowRight"]) player.vx = 3;
  else if(keys["ArrowLeft"]) player.vx = -3;
  else player.vx = 0;

  if(keys["Space"] && player.onGround){
    player.vy = -10;
    player.onGround = false;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;
  for(let p of platforms){
    if(hit(player,p) && player.vy > 0){
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  for(let m of movingPlatforms){
    m.x += m.dir * 2;
    if(m.x > 1300 || m.x < 1000) m.dir *= -1;

    if(hit(player,m) && player.vy > 0){
      player.y = m.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.x += m.dir * 2;
    }
  }

  for(let s of spikes){
    if(hit(player,s)) reset();
  }

  if(player.y > canvas.height) reset();

  // ゴール判定
  if(hit(player, goal)){
    gameClear = true;
  }

  cameraX = player.x - 200;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 足場
  ctx.fillStyle = "#228B22";
  for(let p of platforms){
    ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
  }

  // 動く足場
  ctx.fillStyle = "#006400";
  for(let m of movingPlatforms){
    ctx.fillRect(m.x - cameraX, m.y, m.w, m.h);
  }

  // トゲ
  ctx.fillStyle = "black";
  for(let s of spikes){
    ctx.fillRect(s.x - cameraX, s.y, s.w, s.h);
  }

  // ゴール（旗っぽい）
  ctx.fillStyle = "white";
  ctx.fillRect(goal.x - cameraX, goal.y, goal.w, goal.h);
  ctx.fillStyle = "red";
  ctx.fillRect(goal.x - cameraX, goal.y, 20, 20);

  // プレイヤー
  ctx.fillStyle = "red";
  ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

  // クリア表示
  if(gameClear){
    ctx.fillStyle = "black";
    ctx.font = "40px sans-serif";
    ctx.fillText("CLEAR!", 300, 200);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
